<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>BUY</title>

    <style>
        body{
            background-image: url(images/bckgr.jpg);
            background-size: cover;
            background-position: center;
            height: 130vh;
        }
    </style>
</head>
<body>

    <section id="section-3">
		<div class="container">
			<div class="title-box">
				<h2>BUY IT NOW</h2>
				<div class="line"></div>
				<p>Leave your details to purchase this item.</p>
			</div>
			<div id="contact-form">
				<form>
					<div class="form-row">
						<input type="text" name="name" placeholder="Your Name">
						<input type="email" name="email" placeholder="Your Email">
					</div>
					<div class="form-row">
					    <textarea name="Card number" placeholder="Your Card Number"></textarea>
					</div>
                    <div class="form-row">
					    <textarea name="size" placeholder="Your Size"></textarea>
					</div>
                    <div class="form-row">
						<input type="submit" class="big-button" value="Pay" >
					</div>
				</form>
			</div>	
		</div>
	</section>

    <header>
        <div class="f1">
            <img src="images/logo.jpg" alt="Logo" id="img1" width="100px" height="100px"></img>
            <nav>
					<ul id="list1">
						<li><a href="shop.html" type="button">Back</a></li>
					</ul>
			</nav>

        </div>
    </header>

    
</body>
</html>
