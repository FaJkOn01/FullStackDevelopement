<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalenge7</title>
</head>
<body>

    <form>
        <fieldset>
            <legend>Personal Information</legend>

        <!--Form Elements-->
        <label for="firstname">First Name : </label> <br>
        <input type="text" id="firstname" name="firstname" readonly required> <br>

        <label for="lastname">Last Name : </label> <br>
        <input type="text" id="lastname" name="lastname" placeholder="your surname" required> <br>

        <label for="email">Email : </label> <br>
        <input type="email" id="email" name="email" disabled> <br>

        <label for="password">Password : </label> <br>
        <input type="password" id="password" name="password" size="40"> <br><br>



        

        

    </form>
    <textarea name="message" rows="10" cols="20"></textarea><br><br>

    <input type="Submit" id="Submit" name="Submit">
    
</body>
</html>
